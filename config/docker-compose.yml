version: '3.8'

networks:
  fraud-network:
    driver: bridge

services:
  # --- INGESTION : ZOOKEEPER/KAFKA ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fraud_zookeeper
    networks:
      - fraud-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fraud_kafka
    ports:
      - "9092:9092"
    networks:
      - fraud-network
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- FEATURE STORE ONLINE : REDIS ---
  redis:
    image: redis:7.0-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    networks:
      - fraud-network
    command: redis-server --appendonly yes

  # --- DATA LAKEHOUSE / OFFLINE METADATA : POSTGRESQL ---
  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: data_engineer
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fraud_lakehouse
    ports:
      - "5432:5432"
    networks:
      - fraud-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local